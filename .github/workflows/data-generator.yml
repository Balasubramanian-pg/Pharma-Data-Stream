name: Generate Pharma Data
on:
  schedule:
    - cron: "*/35 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pharma-stream
  cancel-in-progress: false
jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Pull latest before generating
      run: git pull --rebase origin main

    - name: Run data generator
      run: python generate_data.py

    - name: Commit and push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add prescriptions_stream.csv
        git commit -m "Auto generated pharma prescription data" || echo "No changes to commit"

        # Retry with force-with-lease — safe after rebase, breaks the doom loop
        for i in 1 2 3; do
          git push --force-with-lease origin main && break || {
            echo "Attempt $i failed, re-syncing..."
            git pull --rebase origin main
          }
        done

        # Fail loudly if all retries exhausted
        git push --force-with-lease origin main
