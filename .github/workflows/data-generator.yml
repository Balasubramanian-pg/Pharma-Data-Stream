name: Generate Pharma Data
on:
  schedule:
    - cron: "*/35 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pharma-stream
  cancel-in-progress: false
jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Pull latest before generating
      run: git pull --rebase origin main   # ← sync CSV BEFORE appending

    - name: Run data generator
      run: python generate_data.py         # ← now appends to up-to-date CSV

    - name: Commit and push generated data
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add prescriptions_stream.csv
        git commit -m "Auto generated pharma prescription data" || echo "No changes to commit"

        # Retry push in case another run sneaks in between pull and push
        for i in 1 2 3; do
          git push origin main && break
          echo "Attempt $i failed, re-syncing..."
          git pull --rebase origin main
        done
